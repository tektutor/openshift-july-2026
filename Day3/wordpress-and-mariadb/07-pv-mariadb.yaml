# NFS server and path default to the values in 03-nfs-config.yaml.
# deploy.sh restamps them from that ConfigMap so there is one source of truth.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mariadb-nfs-pv
  labels:
    app: mariadb
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 192.168.10.200
    path: /var/nfs/jegan/mysql
