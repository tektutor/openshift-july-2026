apiVersion: v1
kind: ConfigMap
metadata:
  name: mariadb-scripts
data:
  bootstrap.sh: |
    #!/bin/bash
    # Idempotent role bootstrap. Runs as a sidecar next to mariadbd.
    # Ordinal 0 is the primary; every other ordinal is a GTID replica.
    set -uo pipefail
    ORD="${HOSTNAME##*-}"
    SOCK="/run/mysqld/mysqld.sock"
    myroot() { mysql --socket="$SOCK" -uroot -p"${MYSQL_ROOT_PASSWORD}" "$@"; }

    echo "[bootstrap] pod=$HOSTNAME ordinal=$ORD waiting for local socket"
    until mysqladmin --socket="$SOCK" -uroot -p"${MYSQL_ROOT_PASSWORD}" ping >/dev/null 2>&1; do
      sleep 3
    done
    echo "[bootstrap] local mariadb is up"

    if [ "$ORD" = "0" ]; then
      echo "[bootstrap] configuring primary"
      myroot <<SQL
    CREATE USER IF NOT EXISTS '${REPL_USER}'@'%' IDENTIFIED BY '${REPL_PASSWORD}';
    GRANT REPLICATION SLAVE ON *.* TO '${REPL_USER}'@'%';
    CREATE DATABASE IF NOT EXISTS \`${MYSQL_DATABASE}\`;
    CREATE USER IF NOT EXISTS '${MYSQL_USER}'@'%' IDENTIFIED BY '${MYSQL_PASSWORD}';
    GRANT ALL PRIVILEGES ON \`${MYSQL_DATABASE}\`.* TO '${MYSQL_USER}'@'%';
    FLUSH PRIVILEGES;
    SET GLOBAL read_only=OFF;
    SQL
      echo "[bootstrap] primary ready"
    else
      RUNNING="$(myroot -e 'SHOW SLAVE STATUS\G' 2>/dev/null | awk -F': ' '/Slave_IO_Running/{print $2}')"
      if [ "$RUNNING" = "Yes" ]; then
        echo "[bootstrap] replica already running"
      else
        echo "[bootstrap] replica waiting for primary mariadb-0.mariadb:3306"
        until (echo > /dev/tcp/mariadb-0.mariadb/3306) >/dev/null 2>&1; do sleep 3; done
        echo "[bootstrap] primary reachable, configuring replication"
        myroot <<SQL
    STOP SLAVE;
    SET GLOBAL gtid_slave_pos = "";
    CHANGE MASTER TO MASTER_HOST='mariadb-0.mariadb', MASTER_PORT=3306, MASTER_USER='${REPL_USER}', MASTER_PASSWORD='${REPL_PASSWORD}', MASTER_USE_GTID=slave_pos;
    START SLAVE;
    SQL
        echo "[bootstrap] replication started"
      fi
    fi

    echo "[bootstrap] idle"
    while true; do sleep 3600; done
